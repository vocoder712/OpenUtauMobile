name: Build Android Dev

on:
  # 推送到 dev 分支
  push:
    branches:
      - dev
  # 手动调度
  workflow_dispatch:

jobs:
  build-android:
    # 运行环境
    runs-on: ubuntu-latest
    
    steps:
      # 创建交换空间，避免内存不足导致构建失败
      - name: Create Swap Space
        run: |
          sudo fallocate -l 6G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v4
      # 安装 dotnet
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      # 安装 android 工作负载
      - name: Install Android workload
        run: |
          dotnet workload install android
      # 安装 java 环境
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      # 下载密钥
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > signing.keystore
      # 还原 nuget
      - name: Restore
        run: dotnet restore OpenUtauMobile.Android/OpenUtauMobile.Android.csproj
      # 核心发布命令
      # 构建 Release 模式 | 目标框架 net9.0-android | 仅打包 arm64 架构的 APK
      - name: Publish Android ARM64
        run: |
          dotnet publish OpenUtauMobile.Android/OpenUtauMobile.Android.csproj \
            -c Release \
            -f net9.0-android \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=${{ github.workspace }}/signing.keystore \
            -p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }} \
            -p:RuntimeIdentifier=android-arm64
      # 上传 apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenUtauMobile-android-arm64
          path: |
            OpenUtauMobile.Android/bin/Release/net9.0-android/android-arm64/publish/*.apk
